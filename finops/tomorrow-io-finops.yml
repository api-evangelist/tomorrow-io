optimization:
  - Cache repeated point lookups locally; the Tomorrow.io billing model counts each requested field as one call.
  - Request only the fields you need in Timelines and Forecast calls.
  - Use saved Locations to avoid repeating long polygon coordinates and to tag cohorts for cost attribution.
  - Use Map Tiles for visualization rather than per-point Realtime calls in dashboards.
