aid: tomorrow-io
url: https://raw.githubusercontent.com/api-evangelist/tomorrow-io/refs/heads/main/apis.yml
name: Tomorrow.io
description: >-
  Tomorrow.io is a Boston-based weather intelligence platform combining a global proprietary numerical weather model, a
  constellation of microsatellite weather radars, and a developer-facing v4 REST API. The platform exposes 60+
  hyperlocal data layers — core weather, air quality, pollen, solar, soil, fire, flood, lightning, maritime, aviation,
  road — together with map tiles, severe-weather event detection, routable forecast queries, climate normals, historical
  archive access, customer-defined locations, named insights, and threshold-based webhook alerts. Used by airlines,
  on-demand logistics platforms, agriculture, energy, and the US Air Force, Tomorrow.io's API is designed for ETA-aware
  route planning, geofenced alerting, agentic workflows, and large-scale operational decisioning under weather risk.
image: https://www.tomorrow.io/favicon-32x32.png
humanURL: https://www.tomorrow.io
baseURL: https://api.tomorrow.io/v4
tags:
  - Weather
  - Forecast
  - Climate
  - Risk
  - Air Quality
  - Pollen
  - Lightning
  - Severe Weather
  - Maps
  - Routing
  - Satellite
  - Microsatellites
  - Radar
  - Geospatial
  - Alerts
